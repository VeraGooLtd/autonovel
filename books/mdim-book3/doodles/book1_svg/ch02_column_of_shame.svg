<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Ancient statue in background -->
  <path d="M320 120 L325 80 L335 80 L340 120" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <circle cx="330" cy="72" r="10" stroke="#000" stroke-width="1.5" fill="none"/>
  <path d="M315 120 L310 200 L350 200 L345 120" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M310 200 L305 350 L355 350 L350 200" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Ground line -->
  <path d="M0 350 Q50 348 100 352 Q200 355 300 350 Q350 348 400 352" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Column base -->
  <rect x="155" y="330" width="90" height="20" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
  <rect x="150" y="325" width="100" height="8" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Column shaft with fluting -->
  <rect x="165" y="120" width="70" height="205" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Fluting lines -->
  <line x1="175" y1="125" x2="175" y2="320" stroke="#000" stroke-width="1"/>
  <line x1="185" y1="125" x2="185" y2="320" stroke="#000" stroke-width="1"/>
  <line x1="195" y1="125" x2="195" y2="320" stroke="#000" stroke-width="1"/>
  <line x1="205" y1="125" x2="205" y2="320" stroke="#000" stroke-width="1"/>
  <line x1="215" y1="125" x2="215" y2="320" stroke="#000" stroke-width="1"/>
  <line x1="225" y1="125" x2="225" y2="320" stroke="#000" stroke-width="1"/>

  <!-- Marble texture / cracks -->
  <path d="M180 150 Q185 160 182 175 Q178 190 183 200" stroke="#000" stroke-width="1" fill="none"/>
  <path d="M210 180 Q215 195 212 210" stroke="#000" stroke-width="1" fill="none"/>
  <path d="M195 250 Q200 260 197 275" stroke="#000" stroke-width="1" fill="none"/>
  <path d="M220 280 Q225 290 222 300" stroke="#000" stroke-width="1" fill="none"/>
  <path d="M175 220 Q178 230 176 240" stroke="#000" stroke-width="0.8" fill="none"/>

  <!-- Column capital with scrollwork -->
  <rect x="155" y="105" width="90" height="18" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
  <rect x="148" y="98" width="104" height="10" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Scrollwork -->
  <path d="M155 100 Q145 95 148 88 Q152 82 160 88" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M245 100 Q255 95 252 88 Q248 82 240 88" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M155 105 Q143 100 146 92" stroke="#000" stroke-width="1" fill="none"/>
  <path d="M245 105 Q257 100 254 92" stroke="#000" stroke-width="1" fill="none"/>
  <!-- Decorative volute details -->
  <circle cx="150" cy="92" r="3" stroke="#000" stroke-width="1" fill="none"/>
  <circle cx="250" cy="92" r="3" stroke="#000" stroke-width="1" fill="none"/>

  <!-- Abacus-style decoration on capital -->
  <line x1="165" y1="108" x2="165" y2="118" stroke="#000" stroke-width="1"/>
  <line x1="180" y1="108" x2="180" y2="118" stroke="#000" stroke-width="1"/>
  <line x1="195" y1="108" x2="195" y2="118" stroke="#000" stroke-width="1"/>
  <line x1="210" y1="108" x2="210" y2="118" stroke="#000" stroke-width="1"/>
  <line x1="225" y1="108" x2="225" y2="118" stroke="#000" stroke-width="1"/>
  <line x1="240" y1="108" x2="240" y2="118" stroke="#000" stroke-width="1"/>

  <!-- Juice box on top -->
  <rect x="175" y="60" width="50" height="38" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
  <text x="183" y="78" font-family="Comic Sans MS, cursive" font-size="7" fill="#000">OJ</text>
  <text x="180" y="88" font-family="Comic Sans MS, cursive" font-size="5" fill="#000">100%</text>
  <!-- Straw -->
  <line x1="210" y1="60" x2="215" y2="45" stroke="#000" stroke-width="2" stroke-linecap="round"/>
  <line x1="215" y1="45" x2="218" y2="40" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Juice box details -->
  <path d="M180 82 L220 82" stroke="#000" stroke-width="1"/>
  <path d="M185 85 Q200 90 215 85" stroke="#000" stroke-width="0.8" fill="none"/>

  <!-- Ginger cat sitting on juice box -->
  <!-- Cat body -->
  <ellipse cx="200" cy="52" rx="14" ry="10" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Cat head -->
  <circle cx="200" cy="38" r="10" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Cat ears -->
  <path d="M192 30 L188 18 L196 28" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M208 30 L212 18 L204 28" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Cat eyes - proud squint -->
  <path d="M195 36 Q197 34 200 36" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M202 36 Q204 34 207 36" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Cat nose -->
  <path d="M199 38 L200 40 L201 38" stroke="#000" stroke-width="1" fill="none"/>
  <!-- Cat mouth - smug -->
  <path d="M198 41 Q200 43 202 41" stroke="#000" stroke-width="1" fill="none"/>
  <!-- Whiskers -->
  <line x1="190" y1="38" x2="180" y2="35" stroke="#000" stroke-width="1"/>
  <line x1="190" y1="40" x2="179" y2="40" stroke="#000" stroke-width="1"/>
  <line x1="190" y1="42" x2="180" y2="45" stroke="#000" stroke-width="1"/>
  <line x1="210" y1="38" x2="220" y2="35" stroke="#000" stroke-width="1"/>
  <line x1="210" y1="40" x2="221" y2="40" stroke="#000" stroke-width="1"/>
  <line x1="210" y1="42" x2="220" y2="45" stroke="#000" stroke-width="1"/>
  <!-- Crown on cat -->
  <path d="M192 28 L194 20 L197 25 L200 17 L203 25 L206 20 L208 28" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <circle cx="200" cy="19" r="1.5" fill="#000"/>
  <!-- Cat tail -->
  <path d="M214 52 Q225 48 228 40 Q230 35 225 32" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Cat paws -->
  <ellipse cx="193" cy="60" rx="4" ry="2" stroke="#000" stroke-width="1.5" fill="none"/>
  <ellipse cx="207" cy="60" rx="4" ry="2" stroke="#000" stroke-width="1.5" fill="none"/>

  <!-- Annoyed bird on branch -->
  <path d="M100 100 Q120 90 140 95 Q160 100 170 95" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Bird body -->
  <ellipse cx="130" cy="85" rx="10" ry="7" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Bird head -->
  <circle cx="140" cy="78" r="6" stroke="#000" stroke-width="1.5" fill="none"/>
  <!-- Bird eye - annoyed -->
  <circle cx="142" cy="76" r="2" fill="#000"/>
  <path d="M140 74 L144 73" stroke="#000" stroke-width="1"/>
  <!-- Bird beak -->
  <path d="M146 78 L152 77 L146 80" stroke="#000" stroke-width="1" fill="none"/>
  <!-- Bird wing -->
  <path d="M125 83 Q120 78 128 75" stroke="#000" stroke-width="1.5" fill="none"/>
  <!-- Bird tail -->
  <path d="M120 85 L112 82 L115 88 L110 86" stroke="#000" stroke-width="1" fill="none"/>
  <!-- Thought bubble from bird -->
  <circle cx="155" cy="60" r="2" fill="none" stroke="#000" stroke-width="1"/>
  <circle cx="160" cy="55" r="3" fill="none" stroke="#000" stroke-width="1"/>
  <ellipse cx="168" cy="48" rx="15" ry="10" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="158" y="51" font-family="Comic Sans MS, cursive" font-size="6" fill="#000">NOT</text>
  <text x="156" y="58" font-family="Comic Sans MS, cursive" font-size="6" fill="#000">AGAIN</text>

  <!-- Speech bubble from cat -->
  <ellipse cx="250" cy="30" rx="25" ry="15" fill="none" stroke="#000" stroke-width="1.5"/>
  <path d="M228 40 Q220 45 225 38" stroke="#000" stroke-width="1.5" fill="none"/>
  <text x="232" y="28" font-family="Comic Sans MS, cursive" font-size="6" fill="#000">I AM</text>
  <text x="230" y="36" font-family="Comic Sans MS, cursive" font-size="6" fill="#000">LEGEND</text>

  <!-- Small decorative elements -->
  <circle cx="50" cy="50" r="2" fill="#000"/>
  <circle cx="350" cy="200" r="1.5" fill="#000"/>
  <path d="M30 300 Q35 295 40 300 Q45 305 40 310" stroke="#000" stroke-width="1" fill="none"/>

  <!-- Caption -->
  <text x="200" y="385" font-family="Comic Sans MS, cursive" font-size="16" text-anchor="middle" fill="#000" font-weight="bold">COLUMN OF SHAME</text>
</svg>
