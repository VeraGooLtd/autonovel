<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Park bench in background -->
  <rect x="250" y="220" width="100" height="8" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
  <rect x="255" y="228" width="6" height="30" stroke="#000" stroke-width="1.5" fill="none"/>
  <rect x="339" y="228" width="6" height="30" stroke="#000" stroke-width="1.5" fill="none"/>
  <rect x="250" y="240" width="100" height="5" stroke="#000" stroke-width="1.5" fill="none"/>
  <!-- Bench legs -->
  <line x1="265" y1="258" x2="265" y2="270" stroke="#000" stroke-width="1.5"/>
  <line x1="335" y1="258" x2="335" y2="270" stroke="#000" stroke-width="1.5"/>

  <!-- Ground -->
  <path d="M0 270 Q50 268 100 272 Q200 275 300 270 Q350 268 400 272" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Park fence - detailed with peeling paint -->
  <!-- Horizontal rails -->
  <line x1="0" y1="160" x2="240" y2="160" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="0" y1="195" x2="240" y2="195" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Vertical posts -->
  <line x1="20" y1="140" x2="20" y2="270" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  <line x1="70" y1="140" x2="70" y2="270" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  <line x1="120" y1="140" x2="120" y2="270" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  <line x1="170" y1="140" x2="170" y2="270" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  <line x1="220" y1="140" x2="220" y2="270" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  <!-- Peeling paint details -->
  <path d="M25 170 Q30 168 35 172 Q38 178 33 180" stroke="#000" stroke-width="1" fill="none"/>
  <path d="M75 185 Q80 182 85 186 Q88 192 83 195" stroke="#000" stroke-width="1" fill="none"/>
  <path d="M125 165 Q130 162 135 166 Q138 172 133 175" stroke="#000" stroke-width="1" fill="none"/>
  <path d="M175 175 Q180 172 185 176 Q188 182 183 185" stroke="#000" stroke-width="1" fill="none"/>
  <!-- Rust spots -->
  <circle cx="45" cy="180" r="3" stroke="#000" stroke-width="0.8" fill="none" opacity="0.5"/>
  <circle cx="95" cy="170" r="2" stroke="#000" stroke-width="0.8" fill="none" opacity="0.5"/>
  <circle cx="145" cy="190" r="2.5" stroke="#000" stroke-width="0.8" fill="none" opacity="0.5"/>
  <circle cx="195" cy="165" r="2" stroke="#000" stroke-width="0.8" fill="none" opacity="0.5"/>

  <!-- Pigeon perched on fence -->
  <!-- Body -->
  <ellipse cx="100" cy="148" rx="22" ry="14" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Chest puff -->
  <path d="M85 145 Q80 140 85 135 Q90 132 95 138" stroke="#000" stroke-width="1.5" fill="none"/>
  <!-- Head -->
  <circle cx="78" cy="135" r="10" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- One wide eye -->
  <circle cx="73" cy="132" r="4" stroke="#000" stroke-width="1.5" fill="none"/>
  <circle cx="73" cy="132" r="2" fill="#000"/>
  <!-- One squint eye -->
  <path d="M82 131 Q84 130 86 132" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Beak -->
  <path d="M68 135 L60 137 L68 139" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Tiny spy hat -->
  <path d="M70 122 L72 110 L78 108 L84 110 L86 122" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
  <line x1="70" y1="122" x2="86" y2="122" stroke="#000" stroke-width="2"/>
  <!-- Hat brim -->
  <ellipse cx="78" cy="122" rx="10" ry="3" stroke="#000" stroke-width="1.5" fill="none"/>
  <!-- Feather on hat -->
  <path d="M82 110 Q86 100 84 95" stroke="#000" stroke-width="1" fill="none"/>
  <path d="M84 95 Q86 98 83 100" stroke="#000" stroke-width="0.8" fill="none"/>
  <!-- Wing -->
  <path d="M90 145 Q100 138 108 142 Q112 148 105 152 Q95 155 90 148" stroke="#000" stroke-width="1.5" fill="none"/>
  <!-- Wing detail lines -->
  <path d="M92 147 Q98 142 104 145" stroke="#000" stroke-width="0.8" fill="none"/>
  <path d="M93 150 Q99 145 105 148" stroke="#000" stroke-width="0.8" fill="none"/>
  <!-- Tail feathers -->
  <path d="M122 145 L135 140 L138 145 L132 148 L140 144" stroke="#000" stroke-width="1.5" fill="none"/>
  <path d="M122 150 L134 148 L136 153" stroke="#000" stroke-width="1" fill="none"/>
  <!-- Feet on fence -->
  <path d="M90 160 L88 168 M88 165 L84 168 M88 165 L92 168" stroke="#000" stroke-width="1" fill="none"/>
  <path d="M105 160 L103 168 M103 165 L99 168 M103 165 L107 168" stroke="#000" stroke-width="1" fill="none"/>

  <!-- Sweat drops near pigeon -->
  <path d="M65 125 Q63 120 65 115 Q67 120 65 125" stroke="#000" stroke-width="1" fill="none"/>
  <path d="M90 120 Q88 116 90 112 Q92 116 90 120" stroke="#000" stroke-width="1" fill="none"/>

  <!-- Speech bubble with intel -->
  <ellipse cx="55" cy="95" rx="35" ry="18" fill="none" stroke="#000" stroke-width="1.5"/>
  <path d="M70 110 Q75 118 68 115" stroke="#000" stroke-width="1" fill="none"/>
  <text x="30" y="90" font-family="Comic Sans MS, cursive" font-size="6" fill="#000">SUBJECT:</text>
  <text x="30" y="98" font-family="Comic Sans MS, cursive" font-size="6" fill="#000">SALAMI</text>
  <text x="30" y="106" font-family="Comic Sans MS, cursive" font-size="6" fill="#000">ACQUIRED</text>

  <!-- Crumbs on fence -->
  <ellipse cx="130" cy="158" rx="3" ry="2" stroke="#000" stroke-width="1" fill="none"/>
  <ellipse cx="145" cy="160" rx="2" ry="1.5" stroke="#000" stroke-width="1" fill="none"/>
  <ellipse cx="115" cy="159" rx="2.5" ry="1.5" stroke="#000" stroke-width="1" fill="none"/>
  <circle cx="155" cy="157" r="1.5" stroke="#000" stroke-width="0.8" fill="none"/>

  <!-- Arrow with label -->
  <path d="M180 100 L140 130" stroke="#000" stroke-width="2" stroke-linecap="round"/>
  <polygon points="138,126 134,132 142,128" fill="#000"/>
  <text x="160" y="90" font-family="Comic Sans MS, cursive" font-size="8" fill="#000">AGENT</text>
  <text x="160" y="100" font-family="Comic Sans MS, cursive" font-size="8" fill="#000">FRANK</text>

  <!-- Small decorative elements -->
  <circle cx="350" cy="100" r="1.5" fill="#000"/>
  <circle cx="355" cy="105" r="1" fill="#000"/>
  <path d="M30 50 Q35 45 40 50" stroke="#000" stroke-width="1" fill="none"/>

  <!-- Tree in background -->
  <line x1="350" y1="270" x2="350" y2="200" stroke="#000" stroke-width="3"/>
  <path d="M350 200 Q330 180 350 165 Q370 180 350 200" stroke="#000" stroke-width="1.5" fill="none"/>
  <path d="M350 175 Q335 158 350 145 Q365 158 350 175" stroke="#000" stroke-width="1.5" fill="none"/>

  <!-- Caption -->
  <text x="200" y="385" font-family="Comic Sans MS, cursive" font-size="16" text-anchor="middle" fill="#000" font-weight="bold">FEATHERED FRANK</text>
</svg>
