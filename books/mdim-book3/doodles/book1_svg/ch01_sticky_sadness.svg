<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- STICKY SADNESS — A detailed Diary of a Wimpy Kid style doodle -->
  
  <!-- Kitchen table surface with wood grain texture -->
  <rect x="40" y="280" width="320" height="80" fill="none" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="60" y1="295" x2="340" y2="295" stroke="black" stroke-width="0.5" stroke-linecap="round" stroke-dasharray="8 4"/>
  <line x1="80" y1="310" x2="320" y2="310" stroke="black" stroke-width="0.5" stroke-linecap="round" stroke-dasharray="6 6"/>
  <line x1="100" y1="325" x2="300" y2="325" stroke="black" stroke-width="0.5" stroke-linecap="round" stroke-dasharray="4 8"/>
  
  <!-- Cereal box on table (partially visible) -->
  <rect x="280" y="220" width="60" height="65" fill="none" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <text x="310" y="250" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="6" fill="black">OATS</text>
  <text x="310" y="260" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="5" fill="black">THE HEALTHY</text>
  <text x="310" y="268" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="5" fill="black">KIBBLE</text>
  
  <!-- Bowl — ceramic with rim detail -->
  <path d="M 100 230 Q 100 290 200 310 Q 300 290 300 230" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="200" cy="230" rx="100" ry="28" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Bowl inner shadow -->
  <ellipse cx="200" cy="235" rx="85" ry="20" fill="none" stroke="black" stroke-width="1" stroke-linecap="round" stroke-dasharray="3 5"/>
  
  <!-- Oatmeal lumps — irregular organic shapes -->
  <ellipse cx="155" cy="248" rx="20" ry="14" fill="none" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <ellipse cx="200" cy="242" rx="25" ry="16" fill="none" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <ellipse cx="245" cy="252" rx="18" ry="12" fill="none" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <ellipse cx="175" cy="262" rx="15" ry="10" fill="none" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <ellipse cx="220" cy="258" rx="17" ry="11" fill="none" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Lumpy texture details -->
  <circle cx="148" cy="243" r="4" fill="none" stroke="black" stroke-width="1"/>
  <circle cx="208" cy="236" r="5" fill="none" stroke="black" stroke-width="1"/>
  <circle cx="238" cy="248" r="3" fill="none" stroke="black" stroke-width="1"/>
  
  <!-- Frowny face on the front of the bowl -->
  <!-- Eyes — uneven, hand-drawn style -->
  <ellipse cx="165" cy="225" rx="7" ry="5" fill="black"/>
  <ellipse cx="235" cy="225" rx="7" ry="5" fill="black"/>
  <!-- Eye highlights -->
  <circle cx="167" cy="223" r="1.5" fill="white" stroke="white" stroke-width="0.5"/>
  <circle cx="237" cy="223" r="1.5" fill="white" stroke="white" stroke-width="0.5"/>
  <!-- Angry eyebrows -->
  <path d="M 155 218 L 172 222" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <path d="M 245 218 L 228 222" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <!-- Big frown -->
  <path d="M 170 250 Q 200 268 230 250" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Teeth showing through frown -->
  <line x1="185" y1="252" x2="185" y2="258" stroke="black" stroke-width="1"/>
  <line x1="195" y1="254" x2="195" y2="260" stroke="black" stroke-width="1"/>
  <line x1="205" y1="254" x2="205" y2="260" stroke="black" stroke-width="1"/>
  <line x1="215" y1="252" x2="215" y2="258" stroke="black" stroke-width="1"/>
  
  <!-- Steam rising as tiny fists — with motion lines -->
  <!-- Left fist -->
  <path d="M 130 195 C 115 175 118 155 128 148 C 138 142 132 158 138 170 C 142 160 148 148 142 165 L 138 185" fill="none" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <line x1="125" y1="200" x2="118" y2="195" stroke="black" stroke-width="0.5" stroke-dasharray="2 3"/>
  
  <!-- Middle fist -->
  <path d="M 200 190 C 192 168 198 148 208 142 C 218 136 212 155 218 165 C 222 155 228 142 222 160 L 215 182" fill="none" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <line x1="205" y1="195" x2="200" y2="188" stroke="black" stroke-width="0.5" stroke-dasharray="2 3"/>
  
  <!-- Right fist -->
  <path d="M 270 195 C 285 175 282 155 272 148 C 262 142 268 158 262 170 C 258 160 252 148 258 165 L 262 185" fill="none" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <line x1="275" y1="200" x2="282" y2="195" stroke="black" stroke-width="0.5" stroke-dasharray="2 3"/>
  
  <!-- Spilled oats on the table -->
  <circle cx="120" cy="285" r="2" fill="black"/>
  <circle cx="128" cy="288" r="1.5" fill="black"/>
  <circle cx="135" cy="284" r="1" fill="black"/>
  <circle cx="280" cy="290" r="2" fill="black"/>
  <circle cx="290" cy="287" r="1.5" fill="black"/>
  
  <!-- A spoon lying in the bowl -->
  <line x1="250" y1="200" x2="180" y2="245" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <ellipse cx="255" cy="195" rx="12" ry="8" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" transform="rotate(-30 255 195)"/>
  
  <!-- Decorative swirl in corner (like a kid would doodle) -->
  <path d="M 350 350 C 360 340 355 325 345 320 C 335 315 325 325 328 338" fill="none" stroke="black" stroke-width="1" stroke-linecap="round"/>
  
  <!-- Small heart doodle in corner -->
  <path d="M 55 350 C 50 342 40 342 38 350 C 36 358 50 365 55 370 C 60 365 74 358 72 350 C 70 342 60 342 55 350" fill="none" stroke="black" stroke-width="1" stroke-linecap="round"/>
  
  <!-- Caption -->
  <text x="200" y="385" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="24" fill="black" font-weight="bold">STICKY SADNESS</text>
  
  <!-- Arrow pointing to bowl -->
  <path d="M 85 120 L 120 180" stroke="black" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrowhead)"/>
  <text x="55" y="110" font-family="Comic Sans MS, cursive" font-size="8" fill="black">lumpy!!</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="black"/>
    </marker>
  </defs>
</svg>