  <line x1="206" y1="265" x2="230" y2="240" stroke="#000" stroke-width="2" stroke-linecap="round"/>
  <line x1="228" y1="242" x2="235" y2="235" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>

