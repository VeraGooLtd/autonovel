  <ellipse cx="60" cy="285" rx="15" ry="8" stroke="#000" stroke-width="1" fill="none"/>
  <ellipse cx="75" cy="290" rx="10" ry="5" stroke="#000" stroke-width="1" fill="none"/>
  <circle cx="55" cy="283" r="2" stroke="#000" stroke-width="1" fill="none"/>
  <circle cx="68" cy="287" r="1.5" stroke="#000" stroke-width="1" fill="none"/>
  <circle cx="72" cy="285" r="1" stroke="#000" stroke-width="1" fill="none"/>

