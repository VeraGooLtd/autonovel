  <path d="M200 245 Q198 225 205 215 Q210 210 215 215 Q218 205 222 210 L222 220 Q225 215 228 220 L228 230 Q230 225 228 245" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
