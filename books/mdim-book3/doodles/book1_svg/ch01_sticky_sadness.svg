  <path d="M25 35 Q30 30 35 35 Q40 40 35 45 Q30 50 25 45 Q20 40 25 35" stroke="#000" stroke-width="1" fill="none"/>

  <!-- Heart doodle top-right -->
  <path d="M360 25 Q365 15 375 25 Q385 35 375 50 Q365 60 360 70 Q355 60 345 50 Q335 35 345 25 Q355 15 360 25" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Arrow with label pointing to bowl -->
  <path d="M30 180 L70 250" stroke="#000" stroke-width="2" stroke-linecap="round"/>
  <polygon points="66,248 75,252 68,242" fill="#000"/>
  <text x="15" y="170" font-family="Comic Sans MS, cursive" font-size="8" fill="#000">THIS</text>
  <text x="10" y="180" font-family="Comic Sans MS, cursive" font-size="8" fill="#000">IS MY</text>
  <text x="5" y="190" font-family="Comic Sans MS, cursive" font-size="8" fill="#000">LIFE</text>
  <text x="5" y="200" font-family="Comic Sans MS, cursive" font-size="8" fill="#000">NOW</text>

  <!-- Small decorative dots -->
  <circle cx="350" cy="150" r="1.5" fill="#000"/>
  <circle cx="355" cy="155" r="1" fill="#000"/>
  <circle cx="345" cy="155" r="1" fill="#000"/>

  <!-- Caption -->
  <text x="200" y="380" font-family="Comic Sans MS, cursive" font-size="16" text-anchor="middle" fill="#000" font-weight="bold">STICKY SADNESS</text>
