<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- THE EVIDENCE — Detailed Diary of a Wimpy Kid style doodle -->
  
  <!-- Stone archway — the crime scene entrance -->
  <!-- Left pillar -->
  <rect x="30" y="30" width="40" height="320" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="35" y="35" width="30" height="15" fill="none" stroke="black" stroke-width="1.5"/>
  <!-- Stone texture on pillar -->
  <line x1="40" y1="60" x2="60" y2="60" stroke="black" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="38" y1="80" x2="62" y2="80" stroke="black" stroke-width="0.5" stroke-dasharray="3 5"/>
  <line x1="42" y1="100" x2="58" y2="100" stroke="black" stroke-width="0.5" stroke-dasharray="5 3"/>
  <!-- Cracks in pillar -->
  <path d="M 50 150 L 52 180 L 48 210" fill="none" stroke="black" stroke-width="0.8" stroke-dasharray="2 3"/>
  
  <!-- Right pillar -->
  <rect x="330" y="30" width="40" height="320" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="335" y="35" width="30" height="15" fill="none" stroke="black" stroke-width="1.5"/>
  <line x1="340" y1="60" x2="360" y2="60" stroke="black" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="338" y1="80" x2="362" y2="80" stroke="black" stroke-width="0.5" stroke-dasharray="3 5"/>
  <path d="M 355 200 L 358 250 L 352 290" fill="none" stroke="black" stroke-width="0.8" stroke-dasharray="2 3"/>
  
  <!-- Arch top -->
  <path d="M 70 30 Q 200 -10 330 30" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Arch inner curve -->
  <path d="M 85 35 Q 200 0 315 35" fill="none" stroke="black" stroke-width="1.5" stroke-dasharray="3 3"/>
  <!-- Keystone -->
  <path d="M 185 5 L 200 -5 L 215 5" fill="none" stroke="black" stroke-width="2"/>
  <text x="200" y="12" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="6" fill="black">HIGH SPIRE</text>
  
  <!-- Dark interior of archway -->
  <path d="M 70 350 L 70 50 Q 200 10 330 50 L 330 350 Z" fill="black" opacity="0.15"/>
  <text x="200" y="200" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="16" fill="black" opacity="0.4">DANGER</text>
  <text x="200" y="230" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="10" fill="black" opacity="0.3">or cats?</text>
  
  <!-- Paw-shaped mud blobs leading to arch — detailed -->
  <!-- Large paw print (closest, bottom-right) -->
  <ellipse cx="300" cy="310" rx="22" ry="15" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="288" cy="298" r="7" fill="none" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <circle cx="308" cy="293" r="7" fill="none" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <circle cx="322" cy="300" r="7" fill="none" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <!-- Mud splatter around it -->
  <circle cx="315" cy="325" r="3" fill="none" stroke="black" stroke-width="1"/>
  <circle cx="290" cy="328" r="2" fill="none" stroke="black" stroke-width="1"/>
  
  <!-- Medium paw print (center) -->
  <ellipse cx="230" cy="300" rx="18" ry="12" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="220" cy="290" r="6" fill="none" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <circle cx="235" cy="286" r="6" fill="none" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <circle cx="248" cy="292" r="6" fill="none" stroke="black" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Smaller paw print (further away) -->
  <ellipse cx="170" cy="290" rx="13" ry="9" fill="none" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <circle cx="163" cy="282" r="4.5" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="174" cy="279" r="4.5" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="183" cy="283" r="4.5" fill="none" stroke="black" stroke-width="1.5"/>
  
  <!-- Tiny paw print (nearly at arch) -->
  <ellipse cx="100" cy="295" rx="8" ry="6" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="95" cy="290" r="3" fill="none" stroke="black" stroke-width="1.2"/>
  <circle cx="103" cy="288" r="3" fill="none" stroke="black" stroke-width="1.2"/>
  
  <!-- Extra mud splatters -->
  <ellipse cx="260" cy="320" rx="8" ry="5" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="195" cy="315" r="4" fill="none" stroke="black" stroke-width="1"/>
  <circle cx="140" cy="308" r="3" fill="none" stroke="black" stroke-width="1"/>
  
  <!-- Detective's hand holding magnifying glass (bottom corner) -->
  <path d="M 340 360 Q 350 345 345 330" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="345" cy="325" r="3" fill="black"/> <!-- thumb -->
  <!-- Magnifying glass -->
  <circle cx="360" cy="340" r="18" fill="none" stroke="black" stroke-width="2.5"/>
  <line x1="370" y1="355" x2="385" y2="375" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <!-- Glint in magnifying glass -->
  <circle cx="355" cy="335" r="2" fill="none" stroke="black" stroke-width="0.8"/>
  
  <!-- Clue tag on the ground near trails -->
  <rect x="245" y="275" width="35" height="20" fill="white" stroke="black" stroke-width="1.5" transform="rotate(-5 262 285)"/>
  <text x="262" y="288" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="6" fill="black" transform="rotate(-5 262 288)">CLUE #1</text>
  
  <!-- Arrow pointing to trail -->
  <path d="M 180 340 L 190 310" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <text x="165" y="355" font-family="Comic Sans MS, cursive" font-size="7" fill="black">mud trail!</text>
  
  <!-- Small beetle on the ground -->
  <ellipse cx="280" cy="340" rx="6" ry="4" fill="none" stroke="black" stroke-width="0.8"/>
  <circle cx="276" cy="338" r="2" fill="none" stroke="black" stroke-width="0.8"/>
  <line x1="274" y1="337" x2="270" y2="335" stroke="black" stroke-width="0.5"/>
  
  <!-- Caption -->
  <text x="200" y="385" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="24" fill="black" font-weight="bold">THE EVIDENCE</text>
  
  <!-- Decorative corner elements -->
  <!-- Question marks floating -->
  <text x="30" y="380" font-family="Comic Sans MS, cursive" font-size="12" fill="black">???</text>
  
  <!-- Small magnifying glass in corner -->
  <circle cx="370" y="20" r="10" fill="none" stroke="black" stroke-width="1"/>
  <line x1="377" y1="27" x2="385" y2="38" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
</svg>