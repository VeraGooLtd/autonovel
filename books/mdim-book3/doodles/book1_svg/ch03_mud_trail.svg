<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Stone archway -->
  <path d="M250 50 L250 300 L380 300" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M260 60 L260 290 L370 290" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
