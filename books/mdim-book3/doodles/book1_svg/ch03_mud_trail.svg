  <circle cx="175" cy="160" r="18" stroke="#000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <line x1="162" y1="173" x2="148" y2="195" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Glass reflection -->
  <path d="M168 150 Q172 148 175 152" stroke="#000" stroke-width="1" fill="none"/>

  <!-- Clue tag label -->
  <rect x="80" y="140" width="45" height="25" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <line x1="85" y1="150" x2="120" y2="150" stroke="#000" stroke-width="1"/>
  <text x="85" y="148" font-family="Comic Sans MS, cursive" font-size="6" fill="#000">CLUE #1</text>
  <text x="85" y="160" font-family="Comic Sans MS, cursive" font-size="5" fill="#000">MUD = CAT</text>
  <!-- String on tag -->
  <path d="M102 140 Q102 130 108 125" stroke="#000" stroke-width="1" fill="none"/>

  <!-- Arrow with label -->
  <path d="M30 250 L50 270" stroke="#000" stroke-width="2" stroke-linecap="round"/>
  <polygon points="46,268 52,272 48,264" fill="#000"/>
  <text x="5" y="245" font-family="Comic Sans MS, cursive" font-size="7" fill="#000">THE</text>
  <text x="5" y="254" font-family="Comic Sans MS, cursive" font-size="7" fill="#000">TRAIL!</text>

  <!-- Small beetle -->
  <ellipse cx="320" cy="290" rx="5" ry="3" stroke="#000" stroke-width="1.5" fill="none"/>
  <circle cx="316" cy="288" r="2" stroke="#000" stroke-width="1" fill="none"/>
  <line x1="315" y1="287" x2="312" y2="284" stroke="#000" stroke-width="0.8"/>
  <line x1="317" y1="287" x2="316" y2="283" stroke="#000" stroke-width="0.8"/>
  <line x1="324" y1="288" x2="327" y2="285" stroke="#000" stroke-width="0.8"/>
  <line x1="325" y1="289" x2="328" y2="287" stroke="#000" stroke-width="0.8"/>
  <line x1="324" y1="291" x2="327" y2="292" stroke="#000" stroke-width="0.8"/>
  <line x1="317" y1="292" x2="316" y2="294" stroke="#000" stroke-width="0.8"/>

  <!-- Grass tufts -->
  <path d="M30 300 Q32 288 35 300 Q37 285 40 300" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M90 300 Q92 290 95 300 Q97 287 100 300" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M300 300 Q302 290 305 300 Q307 286 310 300" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M350 300 Q352 288 355 300 Q357 285 360 300" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M180 300 Q182 292 185 300" stroke="#000" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- Small decorative stars -->
  <path d="M370 100 L372 95 L374 100 L379 102 L374 104 L372 109 L370 104 L365 102 Z" stroke="#000" stroke-width="1" fill="none"/>
  <path d="M30 100 L32 96 L34 100 L38 101 L34 103 L32 107 L30 103 L26 101 Z" stroke="#000" stroke-width="1" fill="none"/>

  <!-- Caption -->
  <text x="200" y="385" font-family="Comic Sans MS, cursive" font-size="16" text-anchor="middle" fill="#000" font-weight="bold">THE EVIDENCE</text>
</svg>
