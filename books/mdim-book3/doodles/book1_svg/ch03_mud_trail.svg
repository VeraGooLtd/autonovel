  <!-- Paw print 1 (largest) -->
  <ellipse cx="60" cy="280" rx="12" ry="10" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="50" cy="265" r="5" stroke="#000" stroke-width="1.5" fill="none"/>
  <circle cx="60" cy="262" r="5" stroke="#000" stroke-width="1.5" fill="none"/>
  <circle cx="70" cy="265" r="5" stroke="#000" stroke-width="1.5" fill="none"/>
  <!-- Mud splatter around paw 1 -->
  <ellipse cx="45" cy="285" rx="6" ry="4" stroke="#000" stroke-width="1" fill="none"/>
  <ellipse cx="78" cy="278" rx="5" ry="3" stroke="#000" stroke-width="1" fill="none"/>
  <circle cx="55" cy="292" r="2" stroke="#000" stroke-width="1" fill="none"/>
  <circle cx="72" cy="290" r="1.5" stroke="#000" stroke-width="1" fill="none"/>

  <!-- Paw print 2 -->
  <ellipse cx="120" cy="275" rx="10" ry="8" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="112" cy="263" r="4" stroke="#000" stroke-width="1.5" fill="none"/>
  <circle cx="120" cy="260" r="4" stroke="#000" stroke-width="1.5" fill="none"/>
  <circle cx="128" cy="263" r="4" stroke="#000" stroke-width="1.5" fill="none"/>
  <!-- Mud splatter -->
  <ellipse cx="108" cy="280" rx="5" ry="3" stroke="#000" stroke-width="1" fill="none"/>
  <ellipse cx="135" cy="272" rx="4" ry="2.5" stroke="#000" stroke-width="1" fill="none"/>
  <circle cx="115" cy="286" r="1.5" stroke="#000" stroke-width="1" fill="none"/>

  <!-- Paw print 3 -->
  <ellipse cx="175" cy="270" rx="9" ry="7" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="168" cy="259" r="3.5" stroke="#000" stroke-width="1.5" fill="none"/>
  <circle cx="175" cy="256" r="3.5" stroke="#000" stroke-width="1.5" fill="none"/>
  <circle cx="182" cy="259" r="3.5" stroke="#000" stroke-width="1.5" fill="none"/>
  <!-- Mud splatter -->
  <ellipse cx="165" cy="275" rx="4" ry="2.5" stroke="#000" stroke-width="1" fill="none"/>
  <ellipse cx="188" cy="268" rx="3.5" ry="2" stroke="#000" stroke-width="1" fill="none"/>

  <!-- Paw print 4 -->
  <ellipse cx="225" cy="268" rx="8" ry="6" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="219" cy="258" r="3" stroke="#000" stroke-width="1.5" fill="none"/>
  <circle cx="225" cy="255" r="3" stroke="#000" stroke-width="1.5" fill="none"/>
  <circle cx="231" cy="258" r="3" stroke="#000" stroke-width="1.5" fill="none"/>
  <!-- Mud splatter -->
  <ellipse cx="216" cy="273" rx="3.5" ry="2" stroke="#000" stroke-width="1" fill="none"/>
  <ellipse cx="237" cy="265" rx="3" ry="2" stroke="#000" stroke-width="1" fill="none"/>

  <!-- Paw print 5 (smallest, near arch) -->
  <ellipse cx="260" cy="275" rx="6" ry="5" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <circle cx="255" cy="267" r="2.5" stroke="#000" stroke-width="1.5" fill="none"/>
  <circle cx="260" cy="265" r="2.5" stroke="#000" stroke-width="1.5" fill="none"/>
  <circle cx="265" cy="267" r="2.5" stroke="#000" stroke-width="1.5" fill="none"/>

  <!-- Detective hand holding magnifying glass -->
  <!-- Hand -->
  <path d="M140 200 Q135 190 140 180 Q145 175 150 180 L155 175 Q160 170 162 175 L160 185 Q165 180 168 185 L165 195 Q170 192 172 198 L168 210" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Fingers -->
  <path d="M150 180 Q148 172 152 168" stroke="#000" stroke-width="1.5" fill="none"/>
  <path d="M155 175 Q155 167 158 164" stroke="#000" stroke-width="1.5" fill="none"/>
  <path d="M162 175 Q163 167 166 165" stroke="#000" stroke-width="1.5" fill="none"/>
  <path d="M168 185 Q170 178 173 176" stroke="#000" stroke-width="1.5" fill="none"/>
  <!-- Thumb -->
  <path d="M140 200 Q130 195 128 188 Q127 182 132 180" stroke="#000" stroke-width="1.5" fill="none"/>
