  <path d="M250 50 Q310 10 370 50" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M260 60 Q310 25 360 60" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Dark interior -->
  <path d="M260 60 L260 290 L370 290 L370 60 Q310 25 260 60" fill="#000" opacity="0.15"/>
  <!-- Stone blocks on arch -->
  <path d="M255 80 L275 80 L275 95 L255 95 Z" stroke="#000" stroke-width="1" fill="none"/>
  <path d="M278 75 L298 75 L298 90 L278 90 Z" stroke="#000" stroke-width="1" fill="none"/>
  <path d="M302 72 L322 72 L322 87 L302 87 Z" stroke="#000" stroke-width="1" fill="none"/>
  <path d="M326 75 L346 75 L346 90 L326 90 Z" stroke="#000" stroke-width="1" fill="none"/>
  <path d="M350 80 L365 80 L365 95 L350 95 Z" stroke="#000" stroke-width="1" fill="none"/>
  <path d="M255 100 L275 100 L275 115 L255 115 Z" stroke="#000" stroke-width="1" fill="none"/>
  <path d="M350 100 L365 100 L365 115 L350 115 Z" stroke="#000" stroke-width="1" fill="none"/>
