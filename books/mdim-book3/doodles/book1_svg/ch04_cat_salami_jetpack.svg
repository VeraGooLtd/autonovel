<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- SALAMI JETPACK — Detailed Diary of a Wimpy Kid style doodle -->
  
  <!-- Sky background hints -->
  <!-- Clouds -->
  <ellipse cx="80" cy="60" rx="30" ry="15" fill="none" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <ellipse cx="65" cy="55" rx="20" ry="12" fill="none" stroke="black" stroke-width="1.5"/>
  <ellipse cx="320" cy="40" rx="25" ry="12" fill="none" stroke="black" stroke-width="1.5"/>
  <ellipse cx="340" cy="35" rx="18" ry="10" fill="none" stroke="black" stroke-width="1.5"/>
  
  <!-- Giant salami — the "jetpack" body -->
  <!-- Main salami shape — slightly irregular like a real salami -->
  <ellipse cx="200" cy="170" rx="70" ry="45" fill="none" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <!-- Salami end caps -->
  <ellipse cx="130" cy="170" rx="15" ry="40" fill="none" stroke="black" stroke-width="2.5"/>
  <ellipse cx="270" cy="170" rx="15" ry="40" fill="none" stroke="black" stroke-width="2.5"/>
  <!-- Salami texture — fat marbling spots -->
  <circle cx="160" cy="155" r="8" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="185" cy="180" r="6" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="210" cy="150" r="7" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="235" cy="175" r="5" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="175" cy="195" r="4" fill="none" stroke="black" stroke-width="1"/>
  <circle cx="220" cy="190" r="6" fill="none" stroke="black" stroke-width="1.2"/>
  <circle cx="250" cy="160" r="4" fill="none" stroke="black" stroke-width="1"/>
  <!-- More tiny fat spots -->
  <circle cx="150" cy="175" r="2" fill="black"/>
  <circle cx="240" cy="185" r="2.5" fill="black"/>
  <circle cx="195" cy="160" r="1.5" fill="black"/>
  
  <!-- Salami ties at ends -->
  <path d="M 125 135 Q 130 125 135 130" fill="none" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <path d="M 125 205 Q 130 215 135 210" fill="none" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <path d="M 265 135 Q 270 125 275 130" fill="none" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <path d="M 265 205 Q 270 215 275 210" fill="none" stroke="black" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Straps going down to cat -->
  <path d="M 145 200 Q 200 240 255 200" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 155 210 L 155 235" stroke="black" stroke-width="2"/>
  <path d="M 245 210 L 245 235" stroke="black" stroke-width="2"/>
  <!-- Buckle detail -->
  <rect x="195" y="225" width="10" height="8" fill="none" stroke="black" stroke-width="1.5"/>
  <line x1="200" y1="225" x2="200" y2="233" stroke="black" stroke-width="1"/>
  
  <!-- Cat hanging below — detailed -->
  <!-- Cat body -->
  <ellipse cx="200" cy="290" rx="30" ry="25" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Cat head -->
  <circle cx="200" cy="260" r="22" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Cat ears -->
  <path d="M 182 242 L 175 222 L 192 238" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 218 242 L 225 222 L 208 238" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Inner ear -->
  <path d="M 184 240 L 180 228 L 190 237" fill="none" stroke="black" stroke-width="1.2"/>
  <path d="M 216 240 L 220 228 L 210 237" fill="none" stroke="black" stroke-width="1.2"/>
  <!-- Cat eyes — wide with terror/excitement -->
  <ellipse cx="190" cy="255" rx="6" ry="7" fill="none" stroke="black" stroke-width="2"/>
  <ellipse cx="210" cy="255" rx="6" ry="7" fill="none" stroke="black" stroke-width="2"/>
  <!-- Pupils — dilated -->
  <circle cx="190" cy="255" r="3" fill="black"/>
  <circle cx="210" cy="255" r="3" fill="black"/>
  <!-- Eye highlights -->
  <circle cx="192" cy="253" r="1" fill="white" stroke="white" stroke-width="0.5"/>
  <circle cx="212" cy="253" r="1" fill="white" stroke="white" stroke-width="0.5"/>
  <!-- Cat nose -->
  <path d="M 197 263 L 200 260 L 203 263 Z" fill="black"/>
  <!-- Cat mouth — open screaming -->
  <ellipse cx="200" cy="272" rx="8" ry="5" fill="none" stroke="black" stroke-width="2"/>
  <!-- Teeth -->
  <line x1="195" y1="270" x2="195" y2="275" stroke="black" stroke-width="1"/>
  <line x1="205" y1="270" x2="205" y2="275" stroke="black" stroke-width="1"/>
  <!-- Whiskers — all over the place (chaotic) -->
  <line x1="178" y1="258" x2="155" y2="250" stroke="black" stroke-width="1.2"/>
  <line x1="178" y1="263" x2="153" y2="263" stroke="black" stroke-width="1.2"/>
  <line x1="178" y1="268" x2="155" y2="276" stroke="black" stroke-width="1.2"/>
  <line x1="222" y1="258" x2="245" y2="250" stroke="black" stroke-width="1.2"/>
  <line x1="222" y1="263" x2="247" y2="263" stroke="black" stroke-width="1.2"/>
  <line x1="222" y1="268" x2="245" y2="276" stroke="black" stroke-width="1.2"/>
  <!-- Cat arms reaching up holding on -->
  <path d="M 172 285 Q 155 275 150 260" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 228 285 Q 245 275 250 260" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Cat paws gripping -->
  <circle cx="148" cy="257" r="5" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="252" cy="257" r="5" fill="none" stroke="black" stroke-width="2"/>
  <!-- Cat legs dangling -->
  <path d="M 180 310 Q 175 330 180 345" fill="none" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <path d="M 220 310 Q 225 330 220 345" fill="none" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <!-- Cat feet -->
  <ellipse cx="178" cy="348" rx="8" ry="4" fill="none" stroke="black" stroke-width="1.5"/>
  <ellipse cx="222" cy="348" rx="8" ry="4" fill="none" stroke="black" stroke-width="1.5"/>
  <!-- Cat tail — streaming behind -->
  <path d="M 230 300 Q 260 290 275 260 Q 285 240 280 220" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Exhaust/flame trail from salami -->
  <path d="M 170 125 Q 160 100 170 80 Q 180 60 175 40" stroke="black" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 4"/>
  <path d="M 200 120 Q 195 95 200 75 Q 205 55 200 35" stroke="black" stroke-width="2" stroke-linecap="round" stroke-dasharray="5 5"/>
  <path d="M 230 125 Q 240 100 230 80 Q 220 60 225 40" stroke="black" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 6"/>
  <!-- Smoke puffs -->
  <ellipse cx="175" cy="35" rx="12" ry="8" fill="none" stroke="black" stroke-width="1"/>
  <ellipse cx="200" cy="28" rx="10" ry="6" fill="none" stroke="black" stroke-width="1"/>
  <ellipse cx="225" cy="35" rx="11" ry="7" fill="none" stroke="black" stroke-width="1"/>
  
  <!-- Ground below -->
  <line x1="40" y1="360" x2="360" y2="360" stroke="black" stroke-width="1.5"/>
  <!-- Tiny people on ground looking up -->
  <!-- Person 1 -->
  <circle cx="100" cy="355" r="4" fill="black"/>
  <line x1="100" y1="359" x2="100" y2="370" stroke="black" stroke-width="1.5"/>
  <line x1="100" y1="363" x2="95" y2="368" stroke="black" stroke-width="1"/>
  <line x1="100" y1="363" x2="105" y2="368" stroke="black" stroke-width="1"/>
  <!-- Person 2 -->
  <circle cx="120" cy="357" r="3" fill="black"/>
  <line x1="120" y1="360" x2="120" y2="368" stroke="black" stroke-width="1.2"/>
  <!-- Person 3 -->
  <circle cx="280" cy="356" r="3.5" fill="black"/>
  <line x1="280" y1="360" x2="280" y2="370" stroke="black" stroke-width="1.3"/>
  <!-- Arms up on person 3 -->
  <line x1="280" y1="363" x2="272" y2="358" stroke="black" stroke-width="1"/>
  <line x1="280" y1="363" x2="288" y2="358" stroke="black" stroke-width="1"/>
  
  <!-- Speech bubble from person 3 -->
  <ellipse cx="295" cy="340" rx="20" ry="12" fill="white" stroke="black" stroke-width="1"/>
  <text x="295" y="344" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="6" fill="black">WOW!</text>
  
  <!-- Motion lines around salami -->
  <line x1="120" y1="140" x2="100" y2="135" stroke="black" stroke-width="0.8" stroke-dasharray="3 2"/>
  <line x1="280" y1="140" x2="300" y2="135" stroke="black" stroke-width="0.8" stroke-dasharray="3 2"/>
  
  <!-- Caption -->
  <text x="200" y="390" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="24" fill="black" font-weight="bold">SALAMI JETPACK</text>
  
  <!-- Speed lines -->
  <line x1="60" y1="170" x2="90" y2="170" stroke="black" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="310" y1="170" x2="340" y2="170" stroke="black" stroke-width="1" stroke-dasharray="4 3"/>
</svg>